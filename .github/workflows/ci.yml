name: ci.yml
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Run Tests
        env:
          MQTT_HOST: ${{ vars.MQTT_HOST }}
          MQTT_PORT: ${{ vars.MQTT_PORT }}
          OIDC_AUTH_URL: ${{ vars.OIDC_AUTH_URL }}
          OIDC_CLIENT_ID: ${{ secrets.OIDC_CLIENT_ID }}
          OIDC_CLIENT_SECRET: ${{ secrets.OIDC_CLIENT_SECRET }}

        run: ./mvnw clean verify

      - name: Build and Push Docker Image
        run: >
          ./mvnw clean package -DskipTests
          -Dquarkus.container-image.build=true
          -Dquarkus.container-image.push=true
          -Dquarkus.container-image.registry=ghcr.io
          -Dquarkus.container-image.group=${{ github.repository_owner }}
          -Dquarkus.container-image.name=epics-mqtt-gateway
          -Dquarkus.container-image.tag=${{ github.sha }}
        env:
          QUARKUS_CONTAINER_IMAGE_USERNAME: ${{ github.actor }}
          QUARKUS_CONTAINER_IMAGE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
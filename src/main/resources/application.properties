# MQTT Configuration
mqtt.host=${MQTT_HOST}
mqtt.port=${MQTT_PORT}
mqtt.client-id=epics-mqtt-gateway

quarkus.oidc-client.auth-server-url=${OIDC_AUTH_URL}
quarkus.oidc-client.client-id=${OIDC_CLIENT_ID}
quarkus.oidc-client.credentials.secret=${OIDC_CLIENT_SECRET}
quarkus.oidc-client.scopes=openid
quarkus.oidc-client.connection-timeout=10s

quarkus.http.host=0.0.0.0
quarkus.http.port=9000

ca.client.addr.list=127.0.0.1
ca.client.auto.addr.list=NO

ca.server.server.port=5064
ca.server.repeater.port=5065

#opc.client.url=opc.tcp://localhost:50000
opc.server.port=50000

#quarkus.test.include-tags=mqtt

quarkus.native.additional-build-args=\
  --initialize-at-run-time=com.digitalpetri,\
  --initialize-at-run-time=org.eclipse.milo, \
  --initialize-at-run-time=org.bouncycastle,\
  --initialize-at-run-time=com.hivemq.client, \
  --parallelism=8